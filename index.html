<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Día del Jazz</title>

    <!-- Fuente FatFrank -->
    <link rel="stylesheet" href="https://use.typekit.net/vzc7lay.css" />

    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        width: 100vw;
        height: 100vh;
        background-color: #ffffff;
        font-family: "fatfrank", sans-serif;
        font-weight: 400;
        font-style: normal;
      }

      .contenedor {
        position: relative;
        width: 100vw;
        height: 100vh;
      }

      video#fondoVideo {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        object-fit: fill;
        z-index: 0;
      }

      .frase {
        position: absolute;
        top: 80%;
        left: 50%;
        transform: translate(-50%, -50%);
        width: 100%;
        max-width: 1500px;
        max-height: 231px;
        text-align: center;
        font-size: 85px;
        line-height: 1;
        color: #47c9fb;
        font-family: "popins", sans-serif;
        font-weight: 600;
        opacity: 0;
        text-shadow: 0px 0px 0px rgba(0, 0, 0, 0.8);
      }

      .mostrar {
        opacity: 1;
      }
    </style>
  </head>
  <body>
    <div class="contenedor">
      <!-- Fondo en video -->
      <video id="fondoVideo" autoplay muted loop>
        <source src="fondo.mp4" type="video/mp4" />
        Tu navegador no soporta videos en HTML5.
      </video>

      <!-- Texto dinámico -->
      <div id="frase" class="frase">Recomendación</div>
    </div>

   <script>
  // 👇 Frases precargadas (ya no dependes de internet)
  let frases = [
    "La vie en rose - Louis Armstrong",
    "The Girl from Ipanema - Stan Getz",
    "In the mood - Glenn Miller",
    "Fly me to the moon - Astrud Gilberto",
    "Cheek to cheek - Ella Fitzgerald",
    "Love Me Or Leave Me - Nina Simone",
    "Dedicated To You - Freddie Hubbard",
    "What a Wonderful World - Louis Armstrong",
    "Hit the Road Jack - Ray Charles"
  ];

  let index = Math.floor(Math.random() * frases.length);

  function showFrase() {
    const fraseDiv = document.getElementById("frase");
    fraseDiv.innerText = frases[index];
    fraseDiv.classList.add("mostrar");

    index = (index + 1) % frases.length;
  }

  function loopFrases() {
    showFrase();
    setTimeout(loopFrases, 5000);
  }

  // 👇 Arranca inmediatamente (ya está "precargado")
  loopFrases();
</script>
  </body>
</html>
